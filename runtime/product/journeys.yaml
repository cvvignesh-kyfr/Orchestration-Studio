    name: Improve Savings Discipline
    category: Financial Intelligence
    purpose: Help users convert spend awareness into repeatable savings behavior.
    version: 1.0.0
    status: production
    allowedCapabilities:
      - fetch_financial_data
      - analyze_spending
      - categorize_transactions
      - generate_budget_plan
      - generate_savings_recommendations
      - summarize_financial_health
    preferredBehaviors:
      - focus on one actionable recommendation at a time
      - tie advice to observed transaction patterns
      - celebrate measurable progress
    restrictedCapabilities:
      - no autonomous money movement
      - "no high-pressure upsell messaging"
    artifactsCanCreate:
      - transaction_summary
      - spend_profile
